<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Edit ClickHouse Connection' if connection else 'Create ClickHouse Connection' }} — iiko Loader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>{{ 'Edit ClickHouse Connection' if connection else 'Create ClickHouse Connection' }}</h1>

    <form method="post" action="{% if connection %}/connections/ch/{{ connection.id }}/edit{% else %}/connections/ch{% endif %}">
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ connection.name if connection else '' }}" required>
            <div class="form-text">Human-readable identifier (e.g. ch-prod)</div>
        </div>
        <div class="mb-3">
            <label for="host" class="form-label">Host</label>
            <input type="text" class="form-control" id="host" name="host" value="{{ connection.host if connection else 'localhost' }}" required>
        </div>
        <div class="mb-3">
            <label for="port" class="form-label">Port</label>
            <input type="number" class="form-control" id="port" name="port" value="{{ connection.port if connection else 9000 }}" min="1" max="65535" required>
        </div>
        <div class="mb-3">
            <label for="user" class="form-label">User</label>
            <input type="text" class="form-control" id="user" name="user" value="{{ connection.user if connection else 'default' }}" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" value="{{ connection.password if connection else '' }}">
        </div>
        <div class="mb-3">
            <label for="storage_policy" class="form-label">Storage Policy</label>
            <input type="text" class="form-control" id="storage_policy" name="storage_policy" value="{{ connection.storage_policy if connection else 'default' }}">
            <div class="form-text">Optional ClickHouse storage policy</div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">{{ 'Update' if connection else 'Create' }}</button>
            <a href="/connections" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
