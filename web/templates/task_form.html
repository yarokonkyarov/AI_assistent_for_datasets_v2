<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ 'Edit Task' if task else 'Create Task' }} — iiko Loader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>{{ 'Edit Task' if task else 'Create New Task' }}</h1>

    <form method="post" action="{% if task %}/tasks/{{ task.id }}/edit{% else %}/tasks{% endif %}">
        <div class="mb-3">
            <label for="name" class="form-label">Task Name</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ task.name if task else '' }}" required>
        </div>

        <div class="mb-3">
            <label for="dataset_name" class="form-label">Dataset Name (e.g. myata.pl1)</label>
            <input type="text" class="form-control" id="dataset_name" name="dataset_name" value="{{ task.dataset_name if task else '' }}" required>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="iiko_connection_id" class="form-label">iiko Connection</label>
                    <select class="form-select" id="iiko_connection_id" name="iiko_connection_id" required>
                        <option value="">-- Select --</option>
                        {% for conn in iiko_list %}
                            <option value="{{ conn.id }}" {% if task and conn.id == task.iiko_connection_id %}selected{% endif %}>
                                {{ conn.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="clickhouse_connection_id" class="form-label">ClickHouse Connection</label>
                    <select class="form-select" id="clickhouse_connection_id" name="clickhouse_connection_id" required>
                        <option value="">-- Select --</option>
                        {% for conn in ch_list %}
                            <option value="{{ conn.id }}" {% if task and conn.id == task.clickhouse_connection_id %}selected{% endif %}>
                                {{ conn.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label for="report_template_id" class="form-label">Report Template</label>
            <select class="form-select" id="report_template_id" name="report_template_id" required>
                <option value="">-- Select --</option>
                {% for tpl in report_list %}
                    <option value="{{ tpl.id }}" {% if task and tpl.id == task.report_template_id %}selected{% endif %}>
                        {{ tpl.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="days_offset_start" class="form-label">Days Offset Start</label>
                    <input type="number" class="form-control" id="days_offset_start" name="days_offset_start" value="{{ task.days_offset_start if task else 14 }}" min="0">
                    <div class="form-text">How many days back to start (e.g. 14 = last 14 days)</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="days_offset_end" class="form-label">Days Offset End</label>
                    <input type="number" class="form-control" id="days_offset_end" name="days_offset_end" value="{{ task.days_offset_end if task else 0 }}" min="0">
                    <div class="form-text">Days back to end (0 = today)</div>
                </div>
            </div>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if task and task.is_active %}checked{% elif not task %}checked{% endif %}>
            <label class="form-check-label" for="is_active">Active</label>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">{{ 'Update' if task else 'Create' }}</button>
            <a href="/tasks" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
