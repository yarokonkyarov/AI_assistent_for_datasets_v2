<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Report Template — iiko Loader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        textarea { font-family: monospace; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h1>Create Report Template</h1>

    <form method="post" action="/templates" onsubmit="return validateJson()">
        <div class="mb-3">
            <label for="name" class="form-label">Template Name</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="pl1, pl2, fobo_pl6" required>
            <div class="form-text">Short identifier (e.g. pl1)</div>
        </div>
        <div class="mb-3">
            <label for="default_report_config" class="form-label">Report Configuration (JSON)</label>
            <textarea class="form-control" id="default_report_config" name="default_report_config" rows="15" required></textarea>
            <div class="form-text">Full iiko OLAP report config as JSON</div>
            <div id="json-error" class="text-danger mt-1" style="display:none;"></div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Create</button>
            <a href="/templates" class="btn btn-secondary">Cancel</a>
        </div>
    </form>

    <script>
        function validateJson() {
            const textarea = document.getElementById('default_report_config');
            const errorDiv = document.getElementById('json-error');
            try {
                JSON.parse(textarea.value);
                errorDiv.style.display = 'none';
                return true;
            } catch (e) {
                errorDiv.textContent = 'Invalid JSON: ' + e.message;
                errorDiv.style.display = 'block';
                return false;
            }
        }
    </script>
</div>
</body>
</html>
